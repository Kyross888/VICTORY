<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - POS System</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Luna's POS">
    <link rel="apple-touch-icon" href="/img/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/img/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/img/icon-512.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', sans-serif;
        }
        
        body {
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .brand-icon {
            width: 220px;
            height: 120px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        h2 {
            color: #1e293b;
            margin-bottom: 5px;
        }
        
        p {
            color: #64748b;
            margin-bottom: 25px;
        }
        
        .role-selector {
            display: flex;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        
        .role-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            background: transparent;
            color: #64748b;
            transition: 0.3s;
        }
        
        .role-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #475569;
        }
        
        input {
            width: 100%;
            padding: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        
        input:focus {
            border-color: var(--primary);
            outline: 2px solid #c7d2fe;
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
            transition: 0.2s;
        }
        
        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        .footer-link {
            margin-top: 25px;
            color: #64748b;
            font-size: 0.9rem;
        }
        
        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="brand-icon">
            <img src="img/350980067_209708485284413_3662357125511446837_n.jpg" alt="Luna's Logo">
        </div>

        <h2>Welcome Back</h2>
        <p>Please enter your details to sign in.</p>

        <div class="role-selector">
            <button type="button" class="role-btn active" onclick="setRole('admin', this)">Admin</button>
            <button type="button" class="role-btn" onclick="setRole('staff', this)">Staff</button>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email / Username</label>
                <input type="text" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="password" required>
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="footer-link">
            Forgot password? <a href="forgot_password.html">Reset via SMS</a><br style="margin:6px 0;display:block;"><span>Don't have an account? <a href="register.html">Create Account</a></span>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let currentRole = 'admin';

        function setRole(role, btn) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = this.querySelector('.login-btn');
            const email = this.querySelector('input[type="text"]').value.trim();
            const password = this.querySelector('input[type="password"]').value;

            if (!email || !password) {
                alert('Please enter your email and password.');
                return;
            }

            btn.textContent = 'Signing in…';
            btn.disabled = true;

            const res = await api.auth.login(email, password, currentRole);

            if (res.success) {
                if (res.user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else {
                alert(res.error || 'Invalid credentials. Check your email, password, and selected role.');
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
