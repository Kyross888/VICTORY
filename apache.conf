ServerName localhost
UseCanonicalName Off

# ── MIME types required for PWA installability ────────────────
AddType application/manifest+json   .json
AddType application/javascript      .js
AddType image/png                   .png

<VirtualHost *:8080>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch "\.php$">
        SetHandler application/x-httpd-php
    </FilesMatch>

    # Service Worker must never be cached — browsers reject stale SW scopes
    <Files "sw.js">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
        Header set Pragma "no-cache"
        Header set Expires "0"
        Header set Service-Worker-Allowed "/"
    </Files>

    # Manifest must be served with correct type
    <Files "manifest.json">
        Header set Content-Type "application/manifest+json"
        Header set Cache-Control "no-cache"
    </Files>

    # Enable rewrite engine
    RewriteEngine On
    # Redirect root (/) to /login.html (relative, no host:port)
    RewriteRule ^/$ /login.html [R=302,L]

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
